<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR  메인툿 양식</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'Makcasa';
    src: url('fonts/Makcasa-Regular.ttf') format('truetype');
    font-weight: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');
    font-weight: 100;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
    font-weight: 200;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');
    font-weight: 300;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
    font-weight: 600;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
    font-weight: 800;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
    font-weight: 900;
    font-display: swap;
}

:root{
    --bg-deep:#181628;
    --bg-panel:#221f3d;
    --bg-panel-soft:#262244;
    --thread:#4c4578;
    --thread-soft:#332e57;
    --gold:#c9a876;
    --rose:#b98790;
    --text-main:#ece7f6;
    --text-muted:#8b86a8;
    --text-faint:#655f8c;
}

*{ box-sizing:border-box; }

html{ scroll-behavior:smooth; }

body{
    margin:0;
    background:
        radial-gradient(ellipse 60% 40% at 15% -5%, rgba(201,168,118,0.10), transparent 60%),
        radial-gradient(ellipse 50% 35% at 100% 10%, rgba(185,135,144,0.10), transparent 60%),
        var(--bg-deep);
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    line-height:1.7;
    min-height:100vh;
    padding:56px 20px 120px;
}

.wrap{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto;
}

/* ---------- Hero ---------- */
.hero{
    text-align:center;
    margin-bottom:24px;
}

.hero-emblem{
    width:110px;
    height:auto;
    margin:0 auto 8px;
    display:block;
    filter:drop-shadow(0 0 18px rgba(201,168,118,0.28));
}

.hero h1{
    font-family:'Makcasa', serif;
    font-weight:normal;
    font-size:clamp(40px, 7.5vw, 56px);
    letter-spacing:0.03em;
    margin:0;
    background:linear-gradient(135deg, var(--gold) 0%, var(--text-main) 45%, var(--rose) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.hero-sub{
    font-weight:400;
    font-size:13px;
    letter-spacing:0.22em;
    color:var(--text-muted);
    margin:4px 0 0;
}

/* ---------- Capture frame (adds breathing room only while saving as image) ---------- */
.capture-frame{
    padding:0;
    background:transparent;
    border-radius:22px;
    transition:padding 0.15s ease;
}

.capture-frame.capturing{
    padding:52px 40px;
    background:
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(201,168,118,0.10), transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 20%, rgba(185,135,144,0.10), transparent 60%),
        var(--bg-deep);
}

/* ---------- Sheet card ---------- */
.sheet{
    background:linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-soft) 100%);
    border:1px solid var(--thread-soft);
    border-radius:18px;
    padding:56px 48px 48px;
    position:relative;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.55);
}

.sheet::before{
    /* corner star ornament */
    content:"✦";
    position:absolute;
    top:-13px;
    left:50%;
    transform:translateX(-50%);
    color:var(--gold);
    background:var(--bg-panel);
    width:26px; height:26px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    border-radius:50%;
    border:1px solid var(--thread-soft);
}

/* thread that stitches the sections together (dashed border renders reliably when saved as an image) */
.thread-line{
    position:absolute;
    left:48px;
    top:56px;
    bottom:48px;
    width:0;
    border-left:2px dashed var(--thread);
}

@media (max-width: 640px){
    .thread-line{ display:none; }
    .sheet{ padding:44px 22px 36px; }
}

.field{
    position:relative;
    padding-left:56px;
    margin-bottom:40px;
}

@media (max-width: 640px){
    .field{ padding-left:0; }
}

.field:last-of-type{ margin-bottom:0; }

.field .node{
    position:absolute;
    left:41px;
    top:6px;
    width:15px;
    height:15px;
    border-radius:50%;
    background:var(--bg-panel);
    border:1px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
}

.field .node::after{
    content:"";
    width:5px; height:5px;
    border-radius:50%;
    background:var(--gold);
}

@media (max-width: 640px){
    .field .node{ display:none; }
}

.field .label-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:8px;
    flex-wrap:wrap;
}

.field .label-kr{
    font-weight:700;
    font-size:18px;
    color:var(--text-main);
}

.field .label-en{
    font-weight:500;
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--text-faint);
}

textarea{
    width:100%;
    min-height:120px;
    resize:vertical;
    background:rgba(0,0,0,0.16);
    border:1px solid var(--thread-soft);
    border-radius:10px;
    padding:16px 18px;
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    font-size:15px;
    line-height:1.8;
    outline:none;
    transition:border-color 0.2s ease, background 0.2s ease;
}

textarea::placeholder{
    color:#6b6690;
    font-family:'Pretendard', sans-serif;
    font-weight:300;
}

textarea:focus{
    border-color:var(--gold);
    background:rgba(0,0,0,0.24);
}

/* ---------- Tarot picker (Major Arcana) ---------- */
.tarot-picker{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
}

.tarot-picker select{
    flex:1 1 220px;
    background:rgba(0,0,0,0.2);
    border:1px solid var(--thread-soft);
    border-radius:8px;
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:11px 14px;
    outline:none;
    cursor:pointer;
}

.tarot-picker select:focus{
    border-color:var(--gold);
}

.tarot-picker button{
    flex:0 0 auto;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:13px;
    padding:11px 20px;
    border-radius:8px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease;
}

.tarot-picker button:hover{
    background:var(--gold);
    color:var(--bg-panel);
}

.tarot-display{
    text-align:center;
    padding:12px 16px 14px;
    margin-bottom:18px;
    border-top:1px solid var(--thread-soft);
    border-bottom:1px solid var(--thread-soft);
}

.tarot-display .tarot-roman{
    display:block;
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:clamp(22px, 4vw, 28px);
    line-height:1.15;
    letter-spacing:0.14em;
    color:var(--gold);
    margin-bottom:2px;
}

.tarot-display .tarot-name{
    display:block;
    font-family:'Cinzel', serif;
    font-weight:500;
    font-size:clamp(12px, 2.4vw, 14px);
    line-height:1.15;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:var(--text-main);
}

.tarot-display .tarot-kr{
    display:block;
    margin-top:4px;
    font-weight:300;
    font-size:12px;
    line-height:1.3;
    color:var(--text-muted);
}

/* hide picker controls in the saved image, keep the drawn card */
.capturing .tarot-picker{
    display:none;
}

/* ---------- Character name / stat plate ---------- */
.name-row{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.name-input{
    background:transparent;
    border:none;
    border-bottom:1px solid var(--thread-soft);
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:17px;
    text-align:center;
    padding:4px 2px;
    outline:none;
    width:150px;
    transition:border-color 0.2s ease;
}

.name-input::placeholder{
    color:var(--text-faint);
    font-weight:400;
}

.name-input:focus{
    border-color:var(--gold);
}

.name-sep{
    color:var(--text-faint);
    font-size:14px;
}

.stat-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.stat-input{
    background:transparent;
    border:none;
    border-bottom:1px dashed var(--thread-soft);
    color:var(--text-muted);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    font-size:12px;
    text-align:center;
    padding:2px 1px;
    outline:none;
    width:72px;
    transition:border-color 0.2s ease, color 0.2s ease;
}

.stat-input::placeholder{
    color:var(--text-faint);
}

.stat-input:focus{
    border-color:var(--gold);
    color:var(--text-main);
}

.stat-dot{
    color:var(--text-faint);
    font-size:11px;
}

/* ---------- Actions ---------- */
.actions{
    max-width:760px;
    margin:36px auto 0;
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

button.spin{
    font-family:'Pretendard', sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    font-size:14px;
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:14px 30px;
    border-radius:999px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, transform 0.15s ease;
}

button.spin:hover{
    background:var(--gold);
    color:var(--bg-deep);
}

button.spin:active{
    transform:scale(0.97);
}

.toast{
    position:fixed;
    left:50%;
    bottom:36px;
    transform:translateX(-50%) translateY(20px);
    background:var(--bg-panel);
    border:1px solid var(--gold);
    color:var(--text-main);
    padding:12px 22px;
    border-radius:999px;
    font-family:'Pretendard', sans-serif;
    font-weight:400;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:10;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

footer{
    text-align:center;
    margin-top:56px;
    color:var(--text-faint);
    font-weight:300;
    font-size:12px;
    line-height:1.8;
}

footer p{
    margin:0 0 6px;
}

footer a{
    color:var(--gold);
    font-weight:600;
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:border-color 0.2s ease;
}

footer a:hover{
    border-color:var(--gold);
}

@media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ transition:none !important; }
}
</style>
</head>
<body>

<div class="wrap">

    <div class="hero">
        <img src="images/per-fata-emblem.png" alt="Per Fata emblem" class="hero-emblem">
        <h1>PER FATA</h1>
        <p class="hero-sub">메인툿 양식</p>
    </div>

    <div class="capture-frame" id="captureFrame">
        <div class="sheet" id="sheet">
            <div class="thread-line" aria-hidden="true"></div>

            <div class="field">
                <span class="node" aria-hidden="true"></span>

                <div class="tarot-picker">
                    <select id="tarot-select" aria-label="메이저 아르카나 선택">
                        <option value="" disabled selected>메이저 아르카나 선택</option>
                        <option value="0|THE FOOL|바보">0 · 바보</option>
                        <option value="I|THE MAGICIAN|마법사">I · 마법사</option>
                        <option value="II|THE HIGH PRIESTESS|여사제">II · 여사제</option>
                        <option value="III|THE EMPRESS|여황제">III · 여황제</option>
                        <option value="IV|THE EMPEROR|황제">IV · 황제</option>
                        <option value="V|THE HIEROPHANT|교황">V · 교황</option>
                        <option value="VI|THE LOVERS|연인">VI · 연인</option>
                        <option value="VII|THE CHARIOT|전차">VII · 전차</option>
                        <option value="VIII|STRENGTH|힘">VIII · 힘</option>
                        <option value="IX|THE HERMIT|은둔자">IX · 은둔자</option>
                        <option value="X|WHEEL OF FORTUNE|운명의 수레바퀴">X · 운명의 수레바퀴</option>
                        <option value="XI|JUSTICE|정의">XI · 정의</option>
                        <option value="XII|THE HANGED MAN|매달린 남자">XII · 매달린 남자</option>
                        <option value="XIII|DEATH|죽음">XIII · 죽음</option>
                        <option value="XIV|TEMPERANCE|절제">XIV · 절제</option>
                        <option value="XV|THE DEVIL|악마">XV · 악마</option>
                        <option value="XVI|THE TOWER|탑">XVI · 탑</option>
                        <option value="XVII|THE STAR|별">XVII · 별</option>
                        <option value="XVIII|THE MOON|달">XVIII · 달</option>
                        <option value="XIX|THE SUN|태양">XIX · 태양</option>
                        <option value="XX|JUDGEMENT|심판">XX · 심판</option>

                    </select>
                    <button type="button" id="tarot-apply">적용</button>
                </div>

                <div class="tarot-display" id="tarot-display" hidden>
                    <span class="tarot-roman" id="tarot-roman"></span>

                </div>

                <div class="name-row">
                    <input type="text" class="name-input" id="char-name-kr" placeholder="캐릭터 이름">
                    <span class="name-sep">/</span>

                </div>

                <div class="stat-row">
                    <input type="text" class="stat-input" id="char-age" placeholder="나이">
                    <span class="stat-dot">·</span>
                    <input type="text" class="stat-input" id="char-origin" placeholder="출신지">
                    <span class="stat-dot">·</span>
                    <input type="text" class="stat-input" id="char-skill" placeholder="특기">
                    <span class="stat-dot">·</span>
                    <input type="text" class="stat-input" id="char-body" placeholder="키 및 체중">
                </div>

                <div class="label-row">
                    <span class="label-kr">캐릭터</span>
                    <span class="label-en">Character</span>
                </div>

                <textarea id="field-character" placeholder="캐릭터에 관해 서술해주세요."></textarea>
            </div>

            <div class="field">
                <span class="node" aria-hidden="true"></span>
                <div class="label-row">
                    <span class="label-kr">오너</span>
                    <span class="label-en">Owner</span>
                </div>
                <textarea id="field-owner" placeholder="오너 성향, 주의사항, 조율 등에 대해 기재해주세요."></textarea>
            </div>

            <div class="field">
                <span class="node" aria-hidden="true"></span>
                <div class="label-row">
                    <span class="label-kr">원하는 텍스트 관계</span>
                    <span class="label-en">Desired Ties</span>
                </div>
                <textarea id="field-relation" placeholder="원하는 텍스트 관계에 대해 기재해주세요."></textarea>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="spin" id="save-btn">실 정리해서 이미지로 저장하기</button>
    </div>

    <footer>
        <p>본 페이지는 자캐커뮤니티 'Per Fata' 러너들을 위해 만들어진 페이지입니다. 외부 유출을 금합니다.</p>
        <p>Created by <a href="https://x.com/PerFata_" target="_blank" rel="noopener noreferrer">@PerFata_</a></p>
    </footer>

</div>

<div class="toast" id="toast">✦ 이미지가 저장되었습니다</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// auto-grow textareas
document.querySelectorAll('textarea').forEach(function(t){
    var resize = function(){
        t.style.height = 'auto';
        t.style.height = t.scrollHeight + 'px';
    };
    t.addEventListener('input', resize);
});

// tarot arcana apply
document.getElementById('tarot-apply').addEventListener('click', function(){
    var select = document.getElementById('tarot-select');
    if (!select.value) return;

    var parts = select.value.split('|');
    var roman = parts[0];
    var eng = parts[1];
    var kr = parts[2];

    document.getElementById('tarot-roman').textContent = roman;
    document.getElementById('tarot-name').textContent = eng;
    document.getElementById('tarot-kr').textContent = kr;
    document.getElementById('tarot-display').hidden = false;
});

// save the sheet as an image, with breathing room, excluding hero title and footer
document.getElementById('save-btn').addEventListener('click', function(){
    var btn = this;
    var frame = document.getElementById('captureFrame');
    var toast = document.getElementById('toast');

    var showToast = function(msg){
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function(){ toast.classList.remove('show'); }, 2200);
    };

    if (typeof html2canvas === 'undefined') {
        showToast('이미지 저장 기능을 불러오지 못했습니다');
        return;
    }

    btn.disabled = true;
    frame.classList.add('capturing');

    var run = function(){
        html2canvas(frame, {
            backgroundColor: '#181628',
            scale: 2,
            useCORS: true
        }).then(function(canvas){
            frame.classList.remove('capturing');
            btn.disabled = false;

            var link = document.createElement('a');
            link.download = 'per-fata-character.png';
            link.href = canvas.toDataURL('image/png');
            link.click();

            showToast('✦ 이미지가 저장되었습니다');
        }).catch(function(){
            frame.classList.remove('capturing');
            btn.disabled = false;
            showToast('이미지 저장에 실패했습니다');
        });
    };

    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(run);
    } else {
        run();
    }
});
</script>

</body>
</html>
