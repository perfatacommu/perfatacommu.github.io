<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PER FATA 메인툿 양식</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'Makcasa';
    src: url('fonts/Makcasa-Regular.ttf') format('truetype');
    font-weight: normal;
    font-display: swap;
}

@font-face {
    font-family: 'SchoolSafetyNotification';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-5@1.0/HakgyoansimAllimjangTTF-B.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');
    font-weight: 100;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
    font-weight: 200;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');
    font-weight: 300;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
    font-weight: 600;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
    font-weight: 800;
    font-display: swap;
}

@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
    font-weight: 900;
    font-display: swap;
}

:root{
    --bg-deep:#181628;
    --bg-panel:#221f3d;
    --bg-panel-soft:#262244;
    --thread:#4c4578;
    --thread-soft:#332e57;
    --gold:#c9a876;
    --rose:#b98790;
    --text-main:#ece7f6;
    --text-muted:#8b86a8;
    --text-faint:#655f8c;

    /* user-customizable via color pickers; independent of the theme accent above */
    --accent-picked:#c9a876;
    --ch-text-color:#ece7f6;

    --title-gradient: linear-gradient(135deg, var(--gold) 0%, var(--text-main) 45%, var(--rose) 100%);
}

[data-theme="light"]{
    --bg-deep:#f0f3f4;
    --bg-panel:#ececef;
    --bg-panel-soft:#e2e0e6;
    --thread:#b9b6c6;
    --thread-soft:#d4d2da;
    --gold:#a3793f;
    --rose:#a06b76;
    --text-main:#2b2838;
    --text-muted:#635f78;
    --text-faint:#8b87a0;
    --ch-text-color:#432f14;

    --title-gradient: linear-gradient(135deg, #2c28a0 0%, #3c37c7 50%, #6a63e6 100%);
}

*{ box-sizing:border-box; }

html{ scroll-behavior:smooth; }

body{
    margin:0;
    background:
        radial-gradient(ellipse 60% 40% at 15% -5%, rgba(201,168,118,0.10), transparent 60%),
        radial-gradient(ellipse 50% 35% at 100% 10%, rgba(185,135,144,0.10), transparent 60%),
        var(--bg-deep);
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    line-height:1.7;
    min-height:100vh;
    padding:56px 20px 120px;
    transition:background 0.2s ease, color 0.2s ease;
}

.wrap{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto;
}

/* ---------- Hero ---------- */
.hero{
    text-align:center;
    margin-bottom:24px;
}

.hero-emblem{
    width:165px;
    height:auto;
    margin:0 auto 8px;
    display:block;
    filter:drop-shadow(0 0 18px rgba(201,168,118,0.28));
}

.hero h1{
    font-family:'Makcasa', serif;
    font-weight:normal;
    font-size:clamp(60px, 11vw, 84px);
    letter-spacing:0.03em;
    line-height:1;
    margin:0;
    background:var(--title-gradient);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
}

.hero-sub{
    font-weight:400;
    font-size:13px;
    letter-spacing:0.22em;
    color:var(--text-muted);
    margin:0;
}

/* color pickers live in the hero, outside the capture frame, so they never
   appear in the saved image */
.ch-tools{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:14px;
}

.ch-tool-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:var(--text-muted);
}

.ch-tool-label input[type="color"]{
    width:20px;
    height:20px;
    padding:0;
    border:1px solid var(--thread-soft);
    border-radius:50%;
    cursor:pointer;
    background:none;
}

/* ---------- Capture frame (adds breathing room only while saving as image) ---------- */
.capture-frame{
    padding:0;
    background:transparent;
    border-radius:22px;
    transition:padding 0.15s ease;
}

.capture-frame.capturing{
    padding:26px 20px;
    background:transparent;
}

/* ---------- Sheet card ---------- */
.sheet{
    background:linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-soft) 100%);
    border:1px solid var(--thread-soft);
    border-radius:18px;
    padding:56px 48px 24px;
    position:relative;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.4);
    transition:background 0.2s ease, border-color 0.2s ease;
}

@media (max-width: 640px){
    .sheet{ padding:44px 22px 18px; }
}

/* ---------- Character header band (color-pickable name plate) ---------- */
.card-header{
    position:relative;
    margin:-56px -48px 32px;
    padding:8px 22px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    background:var(--accent-picked);
    border-radius:18px 18px 0 0;
    transition:background 0.15s ease;
}

@media (max-width: 640px){
    .card-header{ margin:-44px -22px 28px; padding:8px 16px; }
}

.card-header-star{
    /* straddles the band's top border, like the original top ornament;
       centered with left/right + auto margin (no transform), which stays
       reliable when rasterized for the saved image */
    position:absolute;
    top:-13px;
    left:0;
    right:0;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    width:26px;
    height:26px;
    border-radius:50%;
    background:var(--bg-panel);
    border:1px solid var(--thread-soft);
    color:var(--accent-picked);
    font-size:13px;
}

.ch-left{
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:wrap;
    min-width:0;
}

.ch-right{
    display:flex;
    align-items:flex-end;
    gap:6px;
    flex-wrap:wrap;
}

.ch-name-input, .ch-origin-input, .ch-keyword{
    background:transparent;
    border:none;
    outline:none;
    color:var(--ch-text-color);
    padding:2px 1px;
    line-height:1.15;
}

.ch-name-input::placeholder, .ch-origin-input::placeholder, .ch-keyword::placeholder{
    color:inherit;
    opacity:0.55;
}

.ch-name-input{
    font-family:'SchoolSafetyNotification', sans-serif;
    font-weight:700;
    font-size:clamp(22px, 6vw, 34px);
    width:auto;
    max-width:100%;
    min-width:2ch;
    field-sizing:content;
}

.ch-origin-input{
    font-family:'Makcasa', serif;
    font-weight:normal;
    font-size:clamp(12px, 2.6vw, 15px);
    width:auto;
    max-width:100%;
    min-width:2ch;
    field-sizing:content;
    opacity:0.85;
}

.ch-keyword{
    font-family:'Pretendard', sans-serif;
    font-weight:400;
    font-size:11px;
    text-align:center;
    width:72px;
}

.ch-kw-dot{
    color:var(--ch-text-color);
    opacity:0.6;
    font-size:11px;
}

/* ---------- Fields ---------- */
.field{
    position:relative;
    margin-bottom:40px;
}

.field:last-of-type{ margin-bottom:0; }

.field-signoff{
    font-family:'Makcasa', serif;
    font-weight:normal;
    font-size:clamp(20px, 3.7vw, 28px);
    letter-spacing:0.03em;
    line-height:1;
    text-align:center;
    margin:24px 0 0;
    color:var(--accent-picked);
}

.field-star{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    color:var(--accent-picked);
    font-size:20px;
    line-height:1;
    margin-right:10px;
    flex-shrink:0;
}

.field .label-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
    flex-wrap:wrap;
}

.field .label-kr{
    font-weight:700;
    font-size:18px;
    color:var(--text-main);
}

.field .label-en{
    font-weight:500;
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--ch-text-color);
    opacity:0.75;
}

.ta{
    display:block;
    width:100%;
    min-height:120px;
    resize:vertical;
    background:rgba(0,0,0,0.16);
    border:1px solid var(--thread-soft);
    border-radius:10px;
    padding:12px 18px;
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    font-size:calc(15px - 1pt);
    line-height:1.8;
    outline:none;
    transition:border-color 0.2s ease, background 0.2s ease;
}

[data-theme="light"] .ta{
    background:#dad9de;
}

.ta::placeholder{
    color:var(--text-faint);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
}

textarea.ta:focus{
    border-color:var(--accent-picked);
    background:rgba(0,0,0,0.24);
}

[data-theme="light"] textarea.ta:focus{
    background:#cfced4;
}

/* static replacement used only while generating the saved image:
   guarantees proper word-wrap and no clipping (form controls don't
   reflect their live value or wrap text reliably in html2canvas) */
.ta-static{
    white-space:pre-wrap;
    word-break:break-word;
    overflow-wrap:break-word;
}

.input-static{
    width:auto !important;
    min-width:0 !important;
    max-width:none !important;
    white-space:nowrap;
    display:inline-block;
}

.is-placeholder{
    opacity:0.55;
}

/* ---------- Tarot picker (Major Arcana) — lives in the hero, above the color pickers ---------- */
.tarot-picker{
    display:flex;
    gap:10px;
    max-width:420px;
    margin:18px auto 0;
    flex-wrap:wrap;
    justify-content:center;
}

.tarot-picker select{
    flex:1 1 220px;
    background:rgba(0,0,0,0.2);
    border:1px solid var(--thread-soft);
    border-radius:8px;
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:11px 14px;
    outline:none;
    cursor:pointer;
}

.tarot-picker select:focus{
    border-color:var(--accent-picked);
}

.tarot-picker button{
    flex:0 0 auto;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:13px;
    padding:11px 20px;
    border-radius:8px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease;
}

.tarot-picker button:hover{
    background:var(--gold);
    color:var(--bg-panel);
}

.tarot-display{
    text-align:center;
    padding:12px 16px 14px;
    margin-bottom:18px;
    border-top:1px solid var(--thread-soft);
    border-bottom:1px solid var(--thread-soft);
}

.tarot-display .tarot-roman{
    display:block;
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:clamp(22px, 4vw, 28px);
    line-height:1.15;
    letter-spacing:0.14em;
    color:var(--gold);
    margin-bottom:2px;
}

.tarot-display .tarot-name{
    display:block;
    font-family:'Cinzel', serif;
    font-weight:500;
    font-size:clamp(12px, 2.4vw, 14px);
    line-height:1.15;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:var(--text-main);
}

.tarot-display .tarot-kr{
    display:block;
    margin-top:4px;
    font-weight:300;
    font-size:12px;
    line-height:1.3;
    color:var(--text-muted);
}

/* ---------- Character name / stat plate (within the 캐릭터 field) ---------- */
.name-row{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:4px;
    flex-wrap:wrap;
    margin-bottom:4px;
}

.name-input{
    background:transparent;
    border:none;
    border-bottom:1px solid var(--thread-soft);
    color:var(--text-main);
    font-family:'Pretendard', sans-serif;
    font-weight:500;
    font-size:17px;
    text-align:center;
    padding:4px 2px;
    outline:none;
    width:150px;
    flex-shrink:0;
    transition:border-color 0.2s ease;
}

.name-input::placeholder{
    color:var(--text-faint);
    font-weight:400;
}

.name-input:focus{
    border-color:var(--accent-picked);
}

.stat-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
    row-gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.stat-input{
    background:transparent;
    border:none;
    border-bottom:1px dashed var(--thread-soft);
    color:var(--text-muted);
    font-family:'Pretendard', sans-serif;
    font-weight:300;
    font-size:12px;
    text-align:center;
    padding:2px 1px;
    outline:none;
    flex-shrink:0;
    transition:border-color 0.2s ease, color 0.2s ease;
}

.stat-input:focus{
    border-color:var(--accent-picked);
    color:var(--text-main);
}

#char-age{ width:46px; }
#char-origin{ width:60px; }
#char-skill{ width:84px; }
#char-body{ width:40px; }

.stat-input::placeholder{
    color:var(--text-faint);
}

.stat-dot{
    color:var(--text-faint);
    font-size:11px;
}

/* ---------- Actions ---------- */
.actions{
    max-width:760px;
    margin:36px auto 0;
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

button.spin{
    font-family:'Pretendard', sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    font-size:14px;
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:14px 30px;
    border-radius:999px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, transform 0.15s ease;
}

button.spin:hover{
    background:var(--gold);
    color:var(--bg-deep);
}

button.spin:active{
    transform:scale(0.97);
}

.toast{
    position:fixed;
    left:50%;
    bottom:36px;
    transform:translateX(-50%) translateY(20px);
    background:var(--bg-panel);
    border:1px solid var(--gold);
    color:var(--text-main);
    padding:12px 22px;
    border-radius:999px;
    font-family:'Pretendard', sans-serif;
    font-weight:400;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:10;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

footer{
    text-align:center;
    margin-top:56px;
    color:var(--text-faint);
    font-weight:300;
    font-size:12px;
    line-height:1.8;
}

footer p{
    margin:0 0 6px;
}

footer a{
    color:var(--gold);
    font-weight:600;
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:border-color 0.2s ease;
}

footer a:hover{
    border-color:var(--gold);
}

@media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    *{ transition:none !important; }
}
</style>
</head>
<body>

<div class="wrap">

    <div class="hero">
        <img src="images/per-fata-emblem.png" alt="Per Fata emblem" class="hero-emblem" id="heroEmblem">
        <h1>PR </h1>
        <p class="hero-sub">메인툿 양식</p>

        <div class="tarot-picker">
            <select id="tarot-select" aria-label="메이저 아르카나 선택">
                <option value="" disabled selected>메이저 아르카나 선택</option>
                <option value="0|THE FOOL|바보">0 · 바보</option>
                <option value="I|THE MAGICIAN|마법사">I · 마법사</option>
                <option value="II|THE HIGH PRIESTESS|여사제">II · 여사제</option>
                <option value="III|THE EMPRESS|여황제">III · 여황제</option>
                <option value="IV|THE EMPEROR|황제">IV · 황제</option>
                <option value="V|THE HIEROPHANT|교황">V · 교황</option>
                <option value="VI|THE LOVERS|연인">VI · 연인</option>
                <option value="VII|THE CHARIOT|전차">VII · 전차</option>
                <option value="VIII|STRENGTH|힘">VIII · 힘</option>
                <option value="IX|THE HERMIT|은둔자">IX · 은둔자</option>
                <option value="X|WHEEL OF FORTUNE|운명의 수레바퀴">X · 운명의 수레바퀴</option>
                <option value="XI|JUSTICE|정의">XI · 정의</option>
                <option value="XII|THE HANGED MAN|매달린 남자">XII · 매달린 남자</option>
                <option value="XIII|DEATH|죽음">XIII · 죽음</option>
                <option value="XIV|TEMPERANCE|절제">XIV · 절제</option>
                <option value="XV|THE DEVIL|악마">XV · 악마</option>
                <option value="XVI|THE TOWER|탑">XVI · 탑</option>
                <option value="XVII|THE STAR|별">XVII · 별</option>
                <option value="XVIII|THE MOON|달">XVIII · 달</option>
                <option value="XIX|THE SUN|태양">XIX · 태양</option>
                <option value="XX|JUDGEMENT|심판">XX · 심판</option>
                <option value="XXI|THE WORLD|세계">XXI · 세계</option>
            </select>
            <button type="button" id="tarot-apply">적용</button>
        </div>

        <div class="ch-tools">
            <label class="ch-tool-label">배경색
                <input type="color" id="bandBgPicker" value="#c9a876">
            </label>
            <label class="ch-tool-label">글자색
                <input type="color" id="bandTextPicker" value="#ece7f6">
            </label>
        </div>
    </div>

    <div class="capture-frame" id="captureFrame">
        <div class="sheet" id="sheet">

            <div class="card-header" id="cardHeader">
                <div class="ch-left">
                    <input type="text" class="ch-name-input" id="ch-name" placeholder="캐릭터 이름 입력" size="6">
                    <input type="text" class="ch-origin-input" id="ch-original" placeholder="원문 입력" size="6">
                </div>
                <span class="card-header-star" aria-hidden="true">✦</span>
                <div class="ch-right">
                    <input type="text" class="ch-keyword" id="ch-kw1" placeholder="성격 키워드 입력">
                    <span class="ch-kw-dot">·</span>
                    <input type="text" class="ch-keyword" id="ch-kw2" placeholder="성격 키워드 입력">
                    <span class="ch-kw-dot">·</span>
                    <input type="text" class="ch-keyword" id="ch-kw3" placeholder="성격 키워드 입력">
                </div>
            </div>

            <div class="field">
                <div class="tarot-display" id="tarot-display" hidden>
                    <span class="tarot-roman" id="tarot-roman"></span>
                    <span class="tarot-name" id="tarot-name"></span>
                    <span class="tarot-kr" id="tarot-kr"></span>
                </div>

                <div class="name-row">
                    <input type="text" class="name-input" id="char-name-kr" placeholder="캐릭터 이름 입력">
                    <input type="text" class="name-input" id="char-name-en" placeholder="원문 입력">
                </div>

                <div class="stat-row">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// auto-grow textareas
document.querySelectorAll('textarea.ta').forEach(function(t){
    var resize = function(){
        t.style.height = 'auto';
        t.style.height = t.scrollHeight + 'px';
    };
    t.addEventListener('input', resize);
});

// tarot arcana apply
document.getElementById('tarot-apply').addEventListener('click', function(){
    var select = document.getElementById('tarot-select');
    if (!select.value) return;

    var parts = select.value.split('|');
    var roman = parts[0];
    var eng = parts[1];
    var kr = parts[2];

    document.getElementById('tarot-roman').textContent = roman;
    document.getElementById('tarot-name').textContent = eng;
    document.getElementById('tarot-kr').textContent = kr;
    document.getElementById('tarot-display').hidden = false;
});

// color pickers: background band + accent decorations / header text color
var textPicker = document.getElementById('bandTextPicker');
var userSetTextColor = false;
var textColorDefaults = { dark: '#ece7f6', light: '#432f14' };

function applyTextColorDefault(theme){
    if (userSetTextColor) return;
    var v = textColorDefaults[theme];
    textPicker.value = v;
    document.documentElement.style.setProperty('--ch-text-color', v);
}

document.getElementById('bandBgPicker').addEventListener('input', function(e){
    document.documentElement.style.setProperty('--accent-picked', e.target.value);
});
textPicker.addEventListener('input', function(e){
    userSetTextColor = true;
    document.documentElement.style.setProperty('--ch-text-color', e.target.value);
});

applyTextColorDefault('dark');

// light / dark theme toggle
var isLight = false;
document.getElementById('theme-toggle').addEventListener('click', function(){
    isLight = !isLight;
    document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
    document.getElementById('heroEmblem').src = isLight
        ? 'images/per-fata-emblem-light.png'
        : 'images/per-fata-emblem.png';
    this.textContent = isLight ? '다크 모드' : '라이트 모드';
    applyTextColorDefault(isLight ? 'light' : 'dark');
});

// ---- image export helpers -------------------------------------------------
// Form controls (textarea/input) don't reliably reflect their live value or
// wrap text when rasterized by html2canvas, so for the saved image we swap
// each one for a plain div carrying the same classes (same look) with the
// current value as plain text, which renders and wraps correctly.
function swapForCapture(root){
    var fields = root.querySelectorAll('textarea, input[type="text"]');
    var replacements = [];

    fields.forEach(function(el){
        var hasValue = el.value && el.value.trim().length > 0;
        var div = document.createElement('div');
        div.className = el.className + (el.tagName === 'TEXTAREA' ? ' ta-static' : ' input-static') + (hasValue ? '' : ' is-placeholder');
        div.textContent = hasValue ? el.value : (el.getAttribute('placeholder') || '');

        el.parentNode.insertBefore(div, el);
        el.style.display = 'none';
        replacements.push({ el: el, div: div });
    });

    return replacements;
}

function restoreAfterCapture(replacements){
    replacements.forEach(function(r){
        r.div.remove();
        r.el.style.display = '';
    });
}

// save the sheet as an image, with breathing room, excluding hero title and footer
document.getElementById('save-btn').addEventListener('click', function(){
    var btn = this;
    var frame = document.getElementById('captureFrame');
    var toast = document.getElementById('toast');

    var showToast = function(msg){
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function(){ toast.classList.remove('show'); }, 2200);
    };

    if (typeof html2canvas === 'undefined') {
        showToast('이미지 저장 기능을 불러오지 못했습니다');
        return;
    }

    btn.disabled = true;
    frame.classList.add('capturing');

    var replacements = swapForCapture(frame);

    var run = function(){
        html2canvas(frame, {
            backgroundColor: null,
            scale: 2,
            useCORS: true
        }).then(function(canvas){
            restoreAfterCapture(replacements);
            frame.classList.remove('capturing');
            btn.disabled = false;

            var link = document.createElement('a');
            link.download = 'per-fata-character.png';
            link.href = canvas.toDataURL('image/png');
            link.click();

            showToast('✦ 이미지가 저장되었습니다');
        }).catch(function(){
            restoreAfterCapture(replacements);
            frame.classList.remove('capturing');
            btn.disabled = false;
            showToast('이미지 저장에 실패했습니다');
        });
    };

    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(run);
    } else {
        run();
    }
});
</script>
